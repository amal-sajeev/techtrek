{% extends "base.html" %}
{% block title %}Login — TechTrek{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">&#9889; TECHTREK</div>
      <p class="auth-title">Access your account</p>
    </div>

    <form method="post" action="/auth/login">
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="your_handle" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">Login</button>
    </form>

    <div class="auth-footer">
      New here? <a href="/auth/register">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}
