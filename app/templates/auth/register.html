{% extends "base.html" %}
{% block title %}Register — TechTrek{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">&#9889; TECHTREK</div>
      <p class="auth-title">Create your account</p>
    </div>

    <form method="post" action="/auth/register">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="your_handle" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="you@domain.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="min 8 characters" required>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/auth/login">Login</a>
    </div>
  </div>
</div>
{% endblock %}
