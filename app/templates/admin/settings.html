{% extends "admin/base_admin.html" %}
{% block title %}Platform Settings — Admin — TechTrek{% endblock %}

{% block admin_content %}
<div class="admin-header">
  <h1 class="admin-page-title">Platform Settings</h1>
</div>

<div class="form-card">
  <form method="post" action="/admin/settings">

    <h3 class="section-title" style="margin-bottom:1rem;font-size:1rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">Branding</h3>

    <div class="form-group">
      <label class="form-label" for="set-logo">Platform Logo URL</label>
      <input type="url" name="platform_logo_url" id="set-logo" class="form-input"
             value="{{ s.platform_logo_url }}" placeholder="https://example.com/logo.png">
      {% if s.platform_logo_url %}
      <div style="margin-top:.5rem">
        <img src="{{ s.platform_logo_url }}" alt="Logo preview" style="max-height:60px;max-width:200px;border-radius:4px;border:1px solid var(--border)">
      </div>
      {% endif %}
      <p class="form-hint">Used on PDF invoices sent to customers.</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="set-company">Company Name</label>
        <input type="text" name="company_name" id="set-company" class="form-input" value="{{ s.company_name }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="set-email">Billing Email</label>
        <input type="email" name="company_email" id="set-email" class="form-input" value="{{ s.company_email }}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="set-address">Company Address</label>
      <input type="text" name="company_address" id="set-address" class="form-input" value="{{ s.company_address }}">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="set-phone">Phone</label>
        <input type="text" name="company_phone" id="set-phone" class="form-input" value="{{ s.company_phone }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="set-gstin">GSTIN</label>
        <input type="text" name="company_gstin" id="set-gstin" class="form-input" value="{{ s.company_gstin }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="set-pan">PAN</label>
        <input type="text" name="company_pan" id="set-pan" class="form-input" value="{{ s.company_pan }}">
      </div>
    </div>

    <div class="form-group" style="max-width:160px">
      <label class="form-label" for="set-gst">GST Rate (%)</label>
      <input type="number" name="gst_rate" id="set-gst" class="form-input" value="{{ s.gst_rate }}" min="0" max="100" step="0.01">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Settings</button>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
(function(){
  var logoInput = document.getElementById('set-logo');
  if (!logoInput) return;
  logoInput.addEventListener('blur', function() {
    var url = logoInput.value.trim();
    var preview = logoInput.parentElement.querySelector('img');
    if (url) {
      if (!preview) {
        preview = document.createElement('img');
        preview.alt = 'Logo preview';
        preview.style.cssText = 'max-height:60px;max-width:200px;border-radius:4px;border:1px solid var(--border);margin-top:.5rem;display:block';
        logoInput.parentElement.insertBefore(preview, logoInput.nextSibling);
      }
      preview.src = url;
    } else if (preview) {
      preview.remove();
    }
  });
})();
</script>
{% endblock %}
