{% extends "admin/base_admin.html" %}
{% block title %}{{ "Edit" if seat_type else "New" }} Seat Type — Admin — TechTrek{% endblock %}

{% block admin_content %}
<div class="admin-header">
  <h1 class="admin-page-title">{{ "Edit" if seat_type else "New" }} Seat Type</h1>
</div>

<div class="form-card">
  <form method="post" action="{{ '/admin/seat-types/' ~ seat_type.id ~ '/edit' if seat_type else '/admin/seat-types/new' }}">
    <div class="form-group">
      <label class="form-label" for="st-name">Name</label>
      <input type="text" name="name" id="st-name" class="form-input" value="{{ seat_type.name if seat_type else '' }}" required placeholder="e.g. Premium, Balcony">
    </div>
    <div class="form-group">
      <label class="form-label" for="st-colour">Colour</label>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="color" name="colour" id="st-colour" value="{{ seat_type.colour if seat_type else '#6366f1' }}" style="width:50px;height:38px;padding:2px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-surface);cursor:pointer">
        <input type="text" id="st-colour-hex" class="form-input" value="{{ seat_type.colour if seat_type else '#6366f1' }}" style="width:120px;font-family:var(--font-mono)" readonly>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="st-icon">Icon Class <small style="color:var(--text-muted)">(optional)</small></label>
      <input type="text" name="icon" id="st-icon" class="form-input" value="{{ seat_type.icon if seat_type else '' }}" placeholder="e.g. fa-star, fa-crown">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ "Update" if seat_type else "Create" }} Seat Type</button>
      <a href="/admin/seat-types" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
(function(){
  var picker = document.getElementById('st-colour');
  var hex = document.getElementById('st-colour-hex');
  if(picker && hex){
    picker.addEventListener('input', function(){ hex.value = picker.value; });
  }
})();
</script>
{% endblock %}
